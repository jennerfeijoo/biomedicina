[agent]
state_directory = ".citonauta-agent"

[models]
content = "qwen3.6:27b"
review = "qwen3.6:27b"
technical = "ornith:9b"
embedding = "qwen3-embedding:0.6b"
host = "http://127.0.0.1:11434"
context_tokens = 32768
output_tokens = 16384
temperature = 0.2
timeout_seconds = 3600.0

[generation]
minimum_course_words = 2200
maximum_generation_attempts = 3
maximum_validation_repairs = 3
related_courses = 4
research_results = 8
openalex_enabled = true
europe_pmc_enabled = true

[git]
default_branch = "main"
remote = "origin"
branch_prefix = "agent/course"
auto_push = true
create_pull_request = true
wait_for_checks = true
auto_merge = true
merge_method = "squash"
delete_branch = true
require_clean_worktree = true
