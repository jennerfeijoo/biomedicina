name: Assemble Biología Molecular

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

concurrency:
  group: assemble-biologia-molecular-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/biologia-molecular-semester-course'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reconstruct and verify academic package
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import tarfile

          root = Path('.citonauta/biologia-molecular')
          paths = [root / f'pre-{index:02d}' for index in range(16)]
          paths += [root / f'part-{index:02d}' for index in range(4, 9)]
          assert all(path.is_file() for path in paths), [str(path) for path in paths if not path.is_file()]

          chunks = []
          for path in paths:
              data = path.read_bytes()
              if path.name == 'pre-00':
                  assert len(data) == 3001 and data.endswith(b'\n')
                  data = data[:-1]
              chunks.append(data)

          payload = b''.join(chunks)
          payload_hash = hashlib.sha256(payload).hexdigest()
          print(f'payload_bytes={len(payload)} payload_sha256={payload_hash}')
          assert len(payload) == 62240
          assert payload_hash == 'ef95cc3f92537040382b4cf4dfc8baac1894b9076ca35b3a9602ee7146315fd1'

          archive = base64.b64decode(payload, validate=True)
          archive_hash = hashlib.sha256(archive).hexdigest()
          print(f'archive_bytes={len(archive)} archive_sha256={archive_hash}')
          assert len(archive) == 46679
          assert archive_hash == 'bd6eedd4bd56edb436e06e117d03d67fee6e5eb1d67cdd3a951dbb0e1535b702'

          archive_path = Path('/tmp/biologia-molecular.tar.gz')
          archive_path.write_bytes(archive)
          expected = {
              'data/generated_courses/biologia-molecular.json',
              *{f'data/generated_units/biologia-molecular/unit-{index:02d}.json' for index in range(1, 7)},
          }
          with tarfile.open(archive_path, 'r:gz') as package:
              members = package.getmembers()
              names = {member.name for member in members}
              assert names == expected, {'missing': sorted(expected - names), 'extra': sorted(names - expected)}
              assert all(member.isfile() for member in members)
              package.extractall('.', filter='data')
          PY

      - name: Validate complete course
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject biologia-molecular --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit clean academic package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .citonauta/biologia-molecular
          git rm .citonauta/biologia-molecular-diagnostic.txt
          git rm .github/workflows/assemble-biologia-molecular.yml
          git add data/generated_courses/biologia-molecular.json data/generated_units/biologia-molecular
          git commit -m "Assemble and validate Molecular Biology course"
          git push origin HEAD:agent/biologia-molecular-semester-course
