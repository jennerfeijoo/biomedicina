name: Diagnose Biología Molecular chunks

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/biologia-molecular-semester-course'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Record exact chunk diagnostics
        shell: bash
        run: |
          set -euo pipefail
          if test -f .citonauta/biologia-molecular-diagnostic.txt; then
            cat .citonauta/biologia-molecular-diagnostic.txt
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          import hashlib
          root = Path('.citonauta/biologia-molecular')
          paths = [root / f'pre-{i:02d}' for i in range(16)]
          paths += [root / f'part-{i:02d}' for i in range(4, 9)]
          lines = []
          for path in paths:
              data = path.read_bytes()
              lines.append(f'{path.name} {len(data)} {hashlib.sha256(data).hexdigest()}')
          payload = b''.join(path.read_bytes() for path in paths)
          lines.append(f'payload {len(payload)} {hashlib.sha256(payload).hexdigest()}')
          Path('.citonauta/biologia-molecular-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .citonauta/biologia-molecular-diagnostic.txt
          git commit -m "Record Molecular Biology chunk diagnostics"
          git push origin HEAD:agent/biologia-molecular-semester-course
