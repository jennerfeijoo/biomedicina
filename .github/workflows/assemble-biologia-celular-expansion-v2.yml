name: Assemble rebased Cell Biology disciplinary expansion

on:
  pull_request:
    paths:
      - '.citonauta/biologia-celular-expansion-v2/**'
      - '.github/workflows/assemble-biologia-celular-expansion-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble-and-validate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reconstruct and verify package
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .citonauta/biologia-celular-expansion-v2/part-00-0 \
            .citonauta/biologia-celular-expansion-v2/part-00-1 \
            .citonauta/biologia-celular-expansion-v2/part-00-2 \
            .citonauta/biologia-celular-expansion-v2/part-01 \
            .citonauta/biologia-celular-expansion-v2/part-02 \
            .citonauta/biologia-celular-expansion-v2/part-03-correct \
            > /tmp/biologia-celular-expansion-v2.b64
          test "$(wc -c < /tmp/biologia-celular-expansion-v2.b64)" -eq 18804
          echo '56edb1161cb8cde0a13f6a46de7337ef0c191fa87bf88360be1a756a9e85f844  /tmp/biologia-celular-expansion-v2.b64' | sha256sum --check --strict
          base64 --decode /tmp/biologia-celular-expansion-v2.b64 > /tmp/biologia-celular-expansion-v2.tar.gz
          echo 'a22d2afff027841180fb02a605f4142df1246adc8cd2267683677ac3c54812c6  /tmp/biologia-celular-expansion-v2.tar.gz' | sha256sum --check --strict

      - name: Extract only declared files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import shutil
          import tarfile

          expected = {
              'data/curriculum_expansions/biologia-celular-tisular.json',
              'scripts/audit_curriculum_expansions.py',
              'docs/CURRICULUM_EXPANSIONS.md',
              '.github/workflows/curriculum-completeness.yml',
          }
          root = Path.cwd().resolve()
          with tarfile.open('/tmp/biologia-celular-expansion-v2.tar.gz', 'r:gz') as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              if len(names) != len(expected) or set(names) != expected:
                  raise SystemExit(f'Unexpected archive members: {names}')
              for member in members:
                  if not member.isfile():
                      raise SystemExit(f'Non-file archive member: {member.name}')
                  relative = Path(member.name)
                  if relative.is_absolute() or '..' in relative.parts:
                      raise SystemExit(f'Unsafe path: {member.name}')
                  destination = (root / relative).resolve()
                  if root not in destination.parents:
                      raise SystemExit(f'Path escapes repository: {member.name}')
                  source = archive.extractfile(member)
                  if source is None:
                      raise SystemExit(f'Cannot read member: {member.name}')
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  with source, destination.open('wb') as output:
                      shutil.copyfileobj(source, output)
          PY

      - name: Run complete academic quality gates
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool data/curriculum_expansions/biologia-celular-tisular.json >/dev/null
          python -m py_compile scripts/audit_curriculum_expansions.py
          python scripts/validate_generated_units.py
          python scripts/validate_course_supplements.py
          python scripts/audit_semester_readiness.py --strict
          python scripts/audit_curriculum_completeness.py --strict
          python scripts/audit_curriculum_expansions.py --subject biologia-celular-tisular --strict
          python scripts/audit_curriculum_expansions.py --strict

      - name: Commit materialized expansion
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          rm -rf .citonauta/biologia-celular-expansion-v2
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Materialize auditable Cell Biology disciplinary expansion'
          git push origin "HEAD:${HEAD_BRANCH}"
