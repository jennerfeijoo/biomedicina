name: Assemble Biología II

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: assemble-biologia-ii-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/biologia-ii-semester-course'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reconstruct and verify academic package
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import tarfile

          root = Path('.citonauta/biologia-ii')
          parts = [root / f'part-{index:02d}' for index in range(7)]
          assert all(path.is_file() for path in parts), [str(path) for path in parts if not path.is_file()]

          payload = b''.join(path.read_bytes() for path in parts)
          assert len(payload) == 60296, len(payload)
          assert hashlib.sha256(payload).hexdigest() == 'acd918820ee69d10cb41a301107fc9f74b20398e0d342cab7c4b21d32bc33199'

          archive = base64.b64decode(payload, validate=True)
          assert hashlib.sha256(archive).hexdigest() == '0385916353a7780b023def78ff41c3cb22735e91db4a98f1a9cc0576fbf9816c'
          archive_path = Path('/tmp/biologia-ii.tar.gz')
          archive_path.write_bytes(archive)

          expected = {
              'data/generated_courses/biologia-ii.json',
              *{f'data/generated_units/biologia-ii/unit-{index:02d}.json' for index in range(1, 7)},
          }
          with tarfile.open(archive_path, 'r:gz') as package:
              members = package.getmembers()
              names = {member.name for member in members}
              assert names == expected, {'missing': sorted(expected - names), 'extra': sorted(names - expected)}
              assert all(member.isfile() for member in members)
              package.extractall('.', filter='data')
          PY

      - name: Validate Biología II
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject biologia-ii --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit clean academic package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .citonauta/biologia-ii
          git rm .github/workflows/assemble-biologia-ii.yml
          git add data/generated_courses/biologia-ii.json data/generated_units/biologia-ii
          git commit -m "Assemble and validate Biology II course"
          git push origin HEAD:agent/biologia-ii-semester-course
