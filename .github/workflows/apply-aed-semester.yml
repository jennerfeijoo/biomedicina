name: Apply Algorithms and Data Structures Semester

on:
  push:
    branches:
      - content/algoritmos-estructuras-datos-semester-course

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ !contains(github.event.head_commit.message, '[skip aed-semester]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course branch
        uses: actions/checkout@v4
        with:
          ref: content/algoritmos-estructuras-datos-semester-course

      - name: Materialize and capture result
        run: |
          set +e
          python scripts/materialize_aed_semester.py > aed-materialization.log 2>&1
          status=$?
          echo "exit_status=$status" >> aed-materialization.log
          exit 0

      - name: Commit academic units or diagnostic log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aed-materialization.log
          for unit in data/generated_units/algoritmos-estructuras-datos/unit-{01..06}.json; do
            if [ -f "$unit" ]; then
              git add "$unit"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Capture Algorithms semester materialization [skip aed-semester]"
          git push origin HEAD:content/algoritmos-estructuras-datos-semester-course
