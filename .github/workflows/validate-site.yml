name: Validar CitoNauta

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar currículo y plantillas
        run: python scripts/validate_curriculum.py

      - name: Validar contenido enriquecido del agente
        run: python scripts/validate_agent_content.py

      - name: Revisar las 84 vistas previas
        run: python scripts/check_generated_preview.py --limit 84

      - name: Generar páginas para validación
        run: |
          python scripts/generate_site.py --force
          python scripts/enrich_generated_pages.py

      - name: Validar enlaces internos
        run: python scripts/validate_links.py --quiet
