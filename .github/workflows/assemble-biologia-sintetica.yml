name: Assemble Biología Sintética

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: assemble-biologia-sintetica-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/biologia-sintetica-semester-course'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reconstruct and verify academic package
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, hashlib, tarfile, shutil

          root = Path('.citonauta/biologia-sintetica')
          parts = [root / f'part-{i:02d}' for i in range(4)]
          assert all(p.is_file() for p in parts), [str(p) for p in parts if not p.is_file()]
          payload = b''.join(p.read_bytes() for p in parts)
          assert len(payload) == 24032, len(payload)
          assert hashlib.sha256(payload).hexdigest() == 'b698b05fefcdd35cff33af12c750e42a146aab213763a499ef9a41b9fdad254a'
          archive = base64.b64decode(payload, validate=True)
          assert hashlib.sha256(archive).hexdigest() == '848014037700316b62728df1519842aed77860f63ed794b9ee950de10452dd8c'
          archive_path = Path('/tmp/biologia-sintetica.tar.gz')
          archive_path.write_bytes(archive)

          expected = {'data/generated_courses/biologia-sintetica.json', *{f'data/generated_units/biologia-sintetica/unit-{i:02d}.json' for i in range(1,7)}}
          with tarfile.open(archive_path, 'r:gz') as package:
              members = package.getmembers()
              files = {m.name for m in members if m.isfile()}
              assert files == expected, {'missing': sorted(expected-files), 'extra': sorted(files-expected)}
              assert all(m.isfile() or m.isdir() for m in members)
              for member in members:
                  if not member.isfile():
                      continue
                  target = Path(member.name)
                  assert not target.is_absolute() and '..' not in target.parts
                  target.parent.mkdir(parents=True, exist_ok=True)
                  source = package.extractfile(member)
                  assert source is not None
                  with target.open('wb') as output:
                      shutil.copyfileobj(source, output)
          PY

      - name: Validate Biología Sintética
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject biologia-sintetica --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit clean academic package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .citonauta/biologia-sintetica
          git rm .github/workflows/assemble-biologia-sintetica.yml
          git add data/generated_courses/biologia-sintetica.json data/generated_units/biologia-sintetica
          git commit -m "Assemble and validate Synthetic Biology course"
          git push origin HEAD:agent/biologia-sintetica-semester-course
