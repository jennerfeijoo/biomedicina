name: Diagnose Biofisica readiness

on:
  push:
    branches:
      - agent/biofisica-semester-course

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Capture readiness report
        shell: bash
        run: |
          set -euo pipefail
          python scripts/audit_semester_readiness.py --subject biofisica > biofisica-readiness.txt 2>&1 || true
          python scripts/validate_generated_units.py > biofisica-unit-validation.txt 2>&1 || true
          rm -f .github/workflows/diagnose-biofisica.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture Biofisica readiness diagnostics"
          git push
