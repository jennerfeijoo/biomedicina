name: Publish developed course pages

on:
  push:
    branches:
      - main
    paths:
      - "data/generated_units/**"
      - "templates/asignatura.html"
      - "assets/js/generated-units.js"
      - "assets/css/generated-units.css"
      - "scripts/generate_site.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-developed-course-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate developed units
        run: python scripts/validate_generated_units.py

      - name: Regenerate subject and area pages
        run: python scripts/generate_site.py --force

      - name: Validate internal links
        run: python scripts/validate_links.py

      - name: Commit regenerated pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- '*.html'
          if git diff --cached --quiet; then
            echo "No hay cambios HTML que publicar."
            exit 0
          fi
          git commit -m "Publish developed course units"
          git push origin HEAD:main
