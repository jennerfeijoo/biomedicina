name: Finalize Databases Semester

on:
  push:
    branches:
      - content/bases-datos-semester-course

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ !contains(github.event.head_commit.message, '[skip databases-finalizer]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course branch
        uses: actions/checkout@v4
        with:
          ref: content/bases-datos-semester-course
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate and validate course
        id: academic
        continue-on-error: true
        run: |
          set +e
          : > databases-finalization.log
          python scripts/generate_bases_datos_units.py >> databases-finalization.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python scripts/validate_generated_units.py >> databases-finalization.log 2>&1
            status=$?
          fi
          if [ "$status" -eq 0 ]; then
            python scripts/audit_semester_readiness.py --subject bases-datos --strict >> databases-finalization.log 2>&1
            status=$?
          fi
          echo "exit_status=$status" >> databases-finalization.log
          exit "$status"

      - name: Preserve diagnostic on failure
        if: steps.academic.outcome != 'success'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add databases-finalization.log
          git commit -m 'Capture Databases finalization diagnostic [skip databases-finalizer]' || true
          git push origin HEAD:content/bases-datos-semester-course
          cat databases-finalization.log
          exit 1

      - name: Remove temporary materialization infrastructure
        if: steps.academic.outcome == 'success'
        run: |
          rm -rf .citonauta-agent/payloads/bases-datos
          rm -rf .citonauta-agent/payloads/bases-datos-v2
          rm -rf .citonauta-agent/payloads/bases-datos-v3
          rm -rf .citonauta-agent/payloads/bases-datos-v4
          rm -rf .citonauta-agent/payloads/bases-datos-chunks
          rm -f .citonauta-agent/payloads/bases-datos-semester.b64
          rm -f scripts/materialize_bases_datos_semester.py
          rm -f scripts/generate_bases_datos_units.py
          rm -f databases-materialization.log databases-finalization.log
          rm -f .github/workflows/materialize-bases-datos-semester.yml
          rm -f .github/workflows/generate-bases-datos-semester.yml
          rm -f .github/workflows/finalize-bases-datos-semester.yml

      - name: Commit final academic package
        if: steps.academic.outcome == 'success'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete Databases semester course [skip databases-finalizer]'
          git push origin HEAD:content/bases-datos-semester-course
