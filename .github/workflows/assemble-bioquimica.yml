name: Assemble Bioquímica

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: assemble-bioquimica-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/bioquimica-semester-course'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reconstruct and verify academic package
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import tarfile

          root = Path('.citonauta/bioquimica')
          parts = [root / f'part-{index:02d}' for index in range(6)]
          assert all(path.is_file() for path in parts), [str(path) for path in parts if not path.is_file()]

          payload = b''.join(path.read_bytes() for path in parts)
          assert len(payload) == 42428, len(payload)
          assert hashlib.sha256(payload).hexdigest() == '40639eb62c9c0347532d66061fb9f4f1dce4bd935b7427daf15d07e88e033364'

          archive = base64.b64decode(payload, validate=True)
          assert hashlib.sha256(archive).hexdigest() == 'a7664c6dc3f262a3ab386d6d7359857782c420a35fa4358eaf47379c1d91c9ef'
          archive_path = Path('/tmp/bioquimica.tar.gz')
          archive_path.write_bytes(archive)

          expected = {
              'data/generated_courses/bioquimica.json',
              *{f'data/generated_units/bioquimica/unit-{index:02d}.json' for index in range(1, 7)},
          }
          with tarfile.open(archive_path, 'r:gz') as package:
              members = package.getmembers()
              names = {member.name for member in members if member.isfile()}
              assert names == expected, {'missing': sorted(expected - names), 'extra': sorted(names - expected)}
              assert all(member.isfile() for member in members)
              package.extractall('.', filter='data')
          PY

      - name: Validate Bioquímica
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject bioquimica --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit clean academic package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .citonauta/bioquimica
          git rm .github/workflows/assemble-bioquimica.yml
          git add data/generated_courses/bioquimica.json data/generated_units/bioquimica
          git commit -m "Assemble and validate Biochemistry course"
          git push origin HEAD:agent/bioquimica-semester-course
