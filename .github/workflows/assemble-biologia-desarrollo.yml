name: Assemble Biology Development course

on:
  push:
    branches:
      - agent/biologia-desarrollo-semester-course
    paths:
      - '.github/workflows/assemble-biologia-desarrollo.yml'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/biologia-desarrollo-semester-course
          fetch-depth: 0

      - name: Reconstruct and verify package
        shell: bash
        run: |
          set -euo pipefail
          cat .citonauta/biologia-desarrollo/part-* > /tmp/biologia-desarrollo-package.b64
          base64 --decode /tmp/biologia-desarrollo-package.b64 > /tmp/biologia-desarrollo-package.tar.gz
          echo '1a0977d35f25d8f48bf9936736ea4dbb88b341043022b6c393be875c9c35edbb  /tmp/biologia-desarrollo-package.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/biologia-desarrollo-package.tar.gz

      - name: Validate academic package
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject biologia-desarrollo --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Publish clean academic commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .citonauta/biologia-desarrollo
          rmdir .citonauta 2>/dev/null || true
          rm -f .github/workflows/assemble-biologia-desarrollo.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Build Biology Development as a complete semester course'
          git push origin HEAD:agent/biologia-desarrollo-semester-course
