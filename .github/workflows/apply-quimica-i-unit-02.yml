name: Apply Chemistry I Unit 2

on:
  push:
    branches:
      - content/quimica-i-semester-course

permissions:
  contents: write

jobs:
  apply-unit:
    if: ${{ !contains(github.event.head_commit.message, '[skip q1-unit-02]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course branch
        uses: actions/checkout@v4
        with:
          ref: content/quimica-i-semester-course

      - name: Materialize and run validated upgrade
        run: |
          python scripts/materialize_quimica_i_unit_02_upgrade.py
          python scripts/upgrade_quimica_i_unit_02.py

      - name: Commit upgraded unit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated_units/quimica-i/unit-02.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Upgrade Chemistry I unit 2 [skip q1-unit-02]"
          git push origin HEAD:content/quimica-i-semester-course
