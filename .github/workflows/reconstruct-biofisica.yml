name: Reconstruct Biofisica

on:
  push:
    branches:
      - agent/biofisica-semester-course

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct academic JSON
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import json
          import re

          root = Path('.tmp/biofisica')
          outputs = {
              'u1': Path('data/generated_units/biofisica/unit-01.json'),
              'u5': Path('data/generated_units/biofisica/unit-05.json'),
              'u6': Path('data/generated_units/biofisica/unit-06.json'),
          }
          word_re = re.compile(r'\b[\wÁÉÍÓÚÜÑáéíóúüñ]+\b', re.UNICODE)

          def collect_text(value, key=''):
              if isinstance(value, str):
                  if key == 'url' or value.lower().startswith(('http://', 'https://')):
                      return []
                  return [value]
              if isinstance(value, list):
                  out = []
                  for item in value:
                      out.extend(collect_text(item, key))
                  return out
              if isinstance(value, dict):
                  out = []
                  for child_key, child in value.items():
                      if child_key in {'schema_version', 'subject_id', 'area_id', 'slug', 'status'}:
                          continue
                      out.extend(collect_text(child, child_key))
                  return out
              return []

          for prefix, destination in outputs.items():
              parts = sorted(root.glob(f'{prefix}.part*'))
              if not parts:
                  raise SystemExit(f'Missing archive parts for {prefix}')
              payload = ''.join(part.read_text(encoding='utf-8').strip() for part in parts)
              raw = gzip.decompress(base64.b64decode(payload))
              data = json.loads(raw.decode('utf-8'))
              if data.get('schema_version') != '2.0' or data.get('subject_id') != 'biofisica':
                  raise SystemExit(f'Invalid metadata in {prefix}')
              words = len(word_re.findall(' '.join(collect_text(data))))
              if words < 2000:
                  raise SystemExit(f'{prefix} has only {words} words')
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(raw)
              print(f'{destination}: {words} words')
          PY

          python -m json.tool data/generated_units/biofisica/unit-01.json >/dev/null
          python -m json.tool data/generated_units/biofisica/unit-05.json >/dev/null
          python -m json.tool data/generated_units/biofisica/unit-06.json >/dev/null
          rm -rf .tmp/biofisica
          rm -f .github/workflows/reconstruct-biofisica.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reconstruct Biofisica academic units"
          git push
