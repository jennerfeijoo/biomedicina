name: Apply Programming Fundamentals Audit Fixes

on:
  push:
    branches:
      - content/fundamentos-programacion-semester-course

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[skip fundamentos-audit]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course branch
        uses: actions/checkout@v4
        with:
          ref: content/fundamentos-programacion-semester-course

      - name: Apply and validate corrections
        run: |
          python scripts/fix_fundamentos_programacion_audit.py
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject fundamentos-programacion --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit audit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated_courses/fundamentos-programacion.json data/generated_units/fundamentos-programacion/unit-01.json data/generated_units/fundamentos-programacion/unit-03.json data/generated_units/fundamentos-programacion/unit-05.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Correct Programming Fundamentals audit findings [skip fundamentos-audit]"
          git push origin HEAD:content/fundamentos-programacion-semester-course
