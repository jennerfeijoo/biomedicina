name: Apply Programming Fundamentals Semester Migration

on:
  push:
    branches:
      - content/fundamentos-programacion-semester-course

permissions:
  contents: write

jobs:
  migrate:
    if: ${{ !contains(github.event.head_commit.message, '[skip fundamentos-semester]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course branch
        uses: actions/checkout@v4
        with:
          ref: content/fundamentos-programacion-semester-course

      - name: Upgrade and validate units
        run: |
          python scripts/upgrade_fundamentos_programacion_semester.py
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject fundamentos-programacion --strict

      - name: Commit semester units
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated_units/fundamentos-programacion/unit-*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Upgrade Programming Fundamentals semester units [skip fundamentos-semester]"
          git push origin HEAD:content/fundamentos-programacion-semester-course
