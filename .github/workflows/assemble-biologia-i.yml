name: Assemble Biología I

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/biologia-i-semester-course'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check chunk set
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          parts = sorted(Path('.citonauta/biologia-i').glob('part-*'))
          expected = [f'part-{i:02d}' for i in range(6)]
          actual = [p.name for p in parts]
          print({'expected': expected, 'actual': actual})
          assert actual == expected
          PY

      - name: Build payload and check size
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          parts = sorted(Path('.citonauta/biologia-i').glob('part-*'))
          payload = b''.join(p.read_bytes() for p in parts)
          Path('/tmp/biologia-i.b64').write_bytes(payload)
          print({'payload_bytes': len(payload)})
          assert len(payload) == 40716
          PY

      - name: Check payload digest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib
          payload = Path('/tmp/biologia-i.b64').read_bytes()
          digest = hashlib.sha256(payload).hexdigest()
          print({'payload_sha256': digest})
          assert digest == '70e141c24d981f169841a97072f9b125c3afe37bec240728e70b5d68dd21e8a8'
          PY

      - name: Decode payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          payload = Path('/tmp/biologia-i.b64').read_bytes()
          archive = base64.b64decode(payload, validate=True)
          Path('/tmp/biologia-i.tar.gz').write_bytes(archive)
          print({'archive_bytes': len(archive)})
          PY

      - name: Check archive digest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib
          archive = Path('/tmp/biologia-i.tar.gz').read_bytes()
          digest = hashlib.sha256(archive).hexdigest()
          print({'archive_sha256': digest})
          assert digest == '0ae2cc6a1a3df6545bd2c4ced2f07d0679e2fd0ce79227766bbbb61a1f04171c'
          PY

      - name: Inspect package archive
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf /tmp/biologia-i.tar.gz

      - name: Extract academic package
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/biologia-i.tar.gz -C .

      - name: Validate Biología I
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject biologia-i --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit clean academic package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .citonauta/biologia-i
          git rm .github/workflows/assemble-biologia-i.yml
          git add data/generated_courses/biologia-i.json data/generated_units/biologia-i
          git commit -m "Assemble and validate Biología I course"
          git push origin HEAD:agent/biologia-i-semester-course
