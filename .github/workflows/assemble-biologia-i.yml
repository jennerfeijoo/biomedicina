name: Assemble Biología I

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: assemble-biologia-i
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/biologia-i-semester-course'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current course branch
        uses: actions/checkout@v4
        with:
          ref: agent/biologia-i-semester-course
          fetch-depth: 0

      - name: Check part 00
        run: test -f .citonauta/biologia-i/part-00
      - name: Check part 01
        run: test -f .citonauta/biologia-i/part-01
      - name: Check part 02
        run: test -f .citonauta/biologia-i/part-02
      - name: Check part 03
        run: test -f .citonauta/biologia-i/part-03
      - name: Check part 04
        run: test -f .citonauta/biologia-i/part-04
      - name: Check part 05
        run: test -f .citonauta/biologia-i/part-05

      - name: Build payload from explicit chunks
        shell: bash
        run: |
          set -euo pipefail
          cat .citonauta/biologia-i/part-00 > /tmp/biologia-i.b64
          cat .citonauta/biologia-i/part-01 >> /tmp/biologia-i.b64
          cat .citonauta/biologia-i/part-02 >> /tmp/biologia-i.b64
          cat .citonauta/biologia-i/part-03 >> /tmp/biologia-i.b64
          cat .citonauta/biologia-i/part-04 >> /tmp/biologia-i.b64
          cat .citonauta/biologia-i/part-05 >> /tmp/biologia-i.b64

      - name: Check payload size
        shell: bash
        run: |
          set -euo pipefail
          test "$(wc -c < /tmp/biologia-i.b64)" -eq 40716

      - name: Check payload digest
        shell: bash
        run: |
          set -euo pipefail
          echo "70e141c24d981f169841a97072f9b125c3afe37bec240728e70b5d68dd21e8a8  /tmp/biologia-i.b64" | sha256sum --check --strict

      - name: Decode payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          Path('/tmp/biologia-i.tar.gz').write_bytes(base64.b64decode(Path('/tmp/biologia-i.b64').read_bytes(), validate=True))
          PY

      - name: Check archive digest
        shell: bash
        run: |
          set -euo pipefail
          echo "0ae2cc6a1a3df6545bd2c4ced2f07d0679e2fd0ce79227766bbbb61a1f04171c  /tmp/biologia-i.tar.gz" | sha256sum --check --strict

      - name: Inspect and extract package archive
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf /tmp/biologia-i.tar.gz
          tar -xzf /tmp/biologia-i.tar.gz -C .

      - name: Validate Biología I
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject biologia-i --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit clean academic package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .citonauta/biologia-i
          git rm .github/workflows/assemble-biologia-i.yml
          git add data/generated_courses/biologia-i.json data/generated_units/biologia-i
          git commit -m "Assemble and validate Biología I course"
          git push origin HEAD:agent/biologia-i-semester-course
