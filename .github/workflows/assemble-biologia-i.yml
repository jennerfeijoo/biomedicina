name: Assemble Biología I

on:
  push:
    branches:
      - "agent/biologia-i-semester-course"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/biologia-i-semester-course' || github.ref_name == 'agent/biologia-i-semester-course'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/biologia-i-semester-course
          fetch-depth: 0

      - name: Verify and decode payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          parts = sorted(Path('.citonauta/biologia-i').glob('part-*'))
          assert [p.name for p in parts] == [f'part-{i:02d}' for i in range(6)], parts
          payload = b''.join(p.read_bytes() for p in parts)
          assert len(payload) == 40716, len(payload)
          assert hashlib.sha256(payload).hexdigest() == '70e141c24d981f169841a97072f9b125c3afe37bec240728e70b5d68dd21e8a8'
          archive = base64.b64decode(payload, validate=True)
          assert hashlib.sha256(archive).hexdigest() == '0ae2cc6a1a3df6545bd2c4ced2f07d0679e2fd0ce79227766bbbb61a1f04171c'
          Path('/tmp/biologia-i.tar.gz').write_bytes(archive)
          PY

      - name: Verify package archive
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf /tmp/biologia-i.tar.gz

      - name: Extract academic package
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/biologia-i.tar.gz -C .

      - name: Validate Biología I
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject biologia-i --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit clean academic package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .citonauta/biologia-i
          git rm .github/workflows/assemble-biologia-i.yml
          git add data/generated_courses/biologia-i.json data/generated_units/biologia-i
          git commit -m "Assemble and validate Biología I course"
          git push origin HEAD:agent/biologia-i-semester-course
