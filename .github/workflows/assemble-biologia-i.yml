name: Assemble Biología I

on:
  push:
    branches:
      - "agent/biologia-i-semester-course"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/biologia-i-semester-course' || github.ref_name == 'agent/biologia-i-semester-course'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/biologia-i-semester-course
          fetch-depth: 0

      - name: Verify package chunks
        shell: bash
        run: |
          set -euo pipefail
          echo "0208c69e2dd600c125fb2f3fd44e5717aad5f8ca  .citonauta/biologia-i/part-00" | git hash-object --stdin >/dev/null
          test "$(git hash-object .citonauta/biologia-i/part-00)" = "0208c69e2dd600c125fb2f3fd44e5717aad5f8ca"
          test "$(git hash-object .citonauta/biologia-i/part-01)" = "54fd26f069a60cf85d3381e7f7ac50491f729c6e"
          test "$(git hash-object .citonauta/biologia-i/part-02)" = "c42b5ae172ed1875629eca9d06e98f6aeed0f563"
          test "$(git hash-object .citonauta/biologia-i/part-03)" = "c81be1c80eaa0ab2bf59b09255a5cf6b9881d525"
          test "$(git hash-object .citonauta/biologia-i/part-04)" = "36ae6df931c9003894f61c66b0cbdd644617790c"
          test "$(git hash-object .citonauta/biologia-i/part-05)" = "73771928c529286a33a358ff5808651ebcb18f2c"

      - name: Decode package
        shell: bash
        run: |
          set -euo pipefail
          cat .citonauta/biologia-i/part-* > /tmp/biologia-i.b64
          base64 --decode /tmp/biologia-i.b64 > /tmp/biologia-i.tar.gz

      - name: Verify package archive
        shell: bash
        run: |
          set -euo pipefail
          echo "0ae2cc6a1a3df6545bd2c4ced2f07d0679e2fd0ce79227766bbbb61a1f04171c  /tmp/biologia-i.tar.gz" | sha256sum --check --strict
          tar -tzf /tmp/biologia-i.tar.gz

      - name: Extract academic package
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/biologia-i.tar.gz -C .

      - name: Validate Biología I
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject biologia-i --strict
          python scripts/audit_semester_portfolio.py --strict

      - name: Commit clean academic package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .citonauta/biologia-i
          git rm .github/workflows/assemble-biologia-i.yml
          git add data/generated_courses/biologia-i.json data/generated_units/biologia-i
          git commit -m "Assemble and validate Biología I course"
          git push origin HEAD:agent/biologia-i-semester-course
