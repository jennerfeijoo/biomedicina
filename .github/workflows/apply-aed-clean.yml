name: Apply Clean Algorithms Semester

on:
  push:
    branches:
      - content/algoritmos-estructuras-datos-semester-v2

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip aed-clean]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout clean course branch
        uses: actions/checkout@v4
        with:
          ref: content/algoritmos-estructuras-datos-semester-v2
          token: ${{ secrets.GITHUB_TOKEN }}
          show-progress: false

      - name: Materialize and capture compact diagnostic
        run: |
          set +e
          python scripts/materialize_aed_clean.py > aed-clean-diagnostic.txt 2>&1
          status=$?
          echo "exit_status=$status" >> aed-clean-diagnostic.txt
          exit 0

      - name: Validate materialized units when present
        run: |
          if [ -f data/generated_units/algoritmos-estructuras-datos/unit-06.json ]; then
            python scripts/validate_generated_units.py >> aed-clean-diagnostic.txt 2>&1
            python scripts/audit_semester_readiness.py --subject algoritmos-estructuras-datos --strict >> aed-clean-diagnostic.txt 2>&1
          fi

      - name: Commit academic units or compact diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aed-clean-diagnostic.txt
          for unit in data/generated_units/algoritmos-estructuras-datos/unit-{01..06}.json; do
            if [ -f "$unit" ]; then
              git add "$unit"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Capture clean Algorithms materialization [skip aed-clean]"
          git push origin HEAD:content/algoritmos-estructuras-datos-semester-v2
