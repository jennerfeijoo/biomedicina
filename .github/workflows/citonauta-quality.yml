name: CitoNauta Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repair-algebra-json:
    if: github.event_name == 'pull_request' && github.head_ref == 'content/algebra-semester-course' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: content/algebra-semester-course
          fetch-depth: 0

      - name: Repair missing object closures iteratively
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          changed = []
          for path in sorted(Path('data/generated_units/algebra').glob('unit-*.json')):
              lines = path.read_text(encoding='utf-8').splitlines()
              edits = 0
              for _ in range(30):
                  text = '\n'.join(lines) + '\n'
                  try:
                      json.loads(text)
                      break
                  except json.JSONDecodeError as error:
                      error_index = error.lineno - 1
                      candidate_indexes = [error_index - 1, error_index]
                      repaired = False
                      for index in candidate_indexes:
                          if index < 0 or index >= len(lines):
                              continue
                          raw = lines[index].rstrip()
                          stripped = raw.lstrip()
                          if stripped.startswith('{"') and not raw.endswith('}') and not raw.endswith('},'):
                              lines[index] = raw + '}'
                              edits += 1
                              repaired = True
                              break
                      if not repaired:
                          start = max(0, error_index - 2)
                          end = min(len(lines), error_index + 3)
                          context = '\n'.join(f'{i + 1}: {lines[i]}' for i in range(start, end))
                          raise RuntimeError(f'{path}: no se pudo reparar {error.msg} en línea {error.lineno}\n{context}') from error
              else:
                  raise RuntimeError(f'{path}: se superó el límite de reparaciones')

              if edits:
                  path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
                  json.loads(path.read_text(encoding='utf-8'))
                  changed.append(f'{path}: {edits} cierre(s)')

          print('\n'.join(changed) if changed else 'No changes required.')
          PY

      - name: Commit repair
        run: |
          if git diff --quiet -- data/generated_units/algebra; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated_units/algebra
          git commit -m "Fix Algebra semester JSON closures"
          git push origin HEAD:content/algebra-semester-course

  validate-generated-units:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Run generated-unit validation
        id: unit_validation
        continue-on-error: true
        run: python3 scripts/validate_generated_units.py > generated-unit-validation.txt 2>&1

      - name: Upload generated-unit validation report
        if: steps.unit_validation.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: generated-unit-validation
          path: generated-unit-validation.txt

      - name: Enforce generated-unit validation
        if: steps.unit_validation.outcome != 'success'
        run: |
          cat generated-unit-validation.txt
          exit 1

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate curriculum data
        run: python scripts/validate_curriculum.py

      - name: Validate incremental course plans
        run: python scripts/validate_course_plan_packages.py

      - name: Validate generated units
        run: python scripts/validate_generated_units.py

      - name: Report semester readiness
        run: python scripts/audit_semester_readiness.py

      - name: Enforce Algebra semester readiness
        run: python scripts/audit_semester_readiness.py --subject algebra --strict

      - name: Validate developed-unit renderer
        run: node --check assets/js/generated-units.js

      - name: Validate semester-course renderer
        run: node --check assets/js/semester-course.js

      - name: Validate autonomous course content
        run: python scripts/validate_agent_content.py

      - name: Check generated preview
        run: python scripts/check_generated_preview.py --limit 8

      - name: Check enriched HTML synchronization
        run: python scripts/enrich_generated_pages.py --check

      - name: Check generator dry run
        run: python scripts/generate_site.py --dry-run

      - name: Validate internal links
        run: python scripts/validate_links.py
