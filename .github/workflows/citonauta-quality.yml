name: CitoNauta Quality Gates

on:
  pull_request:

permissions:
  contents: write

jobs:
  add-integration-depth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add integration sections
        run: |
          python scripts/add_q2_integration_sections.py
          if ! git diff --quiet -- data/generated_units/quimica-ii; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/generated_units/quimica-ii
            git commit -m "Add Chemistry II integration sections"
            git push origin HEAD:${{ github.head_ref }}
          fi
