name: CitoNauta Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate curriculum data
        run: python scripts/validate_curriculum.py

      - name: Check generated preview
        run: python scripts/check_generated_preview.py --limit 8

      - name: Check generator dry run
        run: python scripts/generate_site.py --dry-run --with-units

      - name: Validar cobertura lectiva por unidades
        run: python scripts/validate_units.py

      - name: Validate internal links
        run: python scripts/validate_links.py
