name: CitoNauta Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-generated-units:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Run generated-unit validation
        id: unit_validation
        continue-on-error: true
        run: python3 scripts/validate_generated_units.py > generated-unit-validation.txt 2>&1

      - name: Upload generated-unit validation report
        if: steps.unit_validation.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: generated-unit-validation
          path: generated-unit-validation.txt

      - name: Enforce generated-unit validation
        if: steps.unit_validation.outcome != 'success'
        run: |
          cat generated-unit-validation.txt
          exit 1

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate curriculum data
        run: python scripts/validate_curriculum.py

      - name: Validate incremental course plans
        run: python scripts/validate_course_plan_packages.py

      - name: Validate generated units
        run: python scripts/validate_generated_units.py

      - name: Validate semester course architectures
        run: |
          python -m json.tool data/generated_courses/algebra.json > /dev/null
          python -m json.tool data/generated_courses/calculo.json > /dev/null

      - name: Report semester readiness
        run: python scripts/audit_semester_readiness.py

      - name: Enforce Algebra semester readiness
        run: python scripts/audit_semester_readiness.py --subject algebra --strict

      - name: Enforce Calculus semester readiness
        run: python scripts/audit_semester_readiness.py --subject calculo --strict

      - name: Validate developed-unit renderer
        run: node --check assets/js/generated-units.js

      - name: Validate semester-course renderer
        run: node --check assets/js/semester-course.js

      - name: Validate autonomous course content
        run: python scripts/validate_agent_content.py

      - name: Check generated preview
        run: python scripts/check_generated_preview.py --limit 8

      - name: Check enriched HTML synchronization
        run: python scripts/enrich_generated_pages.py --check

      - name: Check generator dry run
        run: python scripts/generate_site.py --dry-run

      - name: Validate internal links
        run: python scripts/validate_links.py
