name: CitoNauta Quality Gates

on:
  pull_request:

permissions:
  contents: write

jobs:
  complete-electrochemistry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Complete electrochemistry section
        run: |
          python scripts/complete_q2_electrochem_section.py
          if ! git diff --quiet -- data/generated_units/quimica-ii/unit-05.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/generated_units/quimica-ii/unit-05.json
            git commit -m "Complete electrochemistry section depth"
            git push origin HEAD:${{ github.head_ref }}
          fi
