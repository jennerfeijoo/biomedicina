name: Apply Databases Semester Final

on:
  push:
    branches:
      - content/bases-datos-semester-final

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip databases-final]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course branch
        uses: actions/checkout@v4
        with:
          ref: content/bases-datos-semester-final
          token: ${{ secrets.GITHUB_TOKEN }}
          show-progress: false

      - name: Materialize and capture diagnostic
        run: |
          set +e
          python scripts/materialize_bases_datos_semester.py > databases-diagnostic.txt 2>&1
          status=$?
          echo "exit_status=$status" >> databases-diagnostic.txt
          exit 0

      - name: Validate units when materialization succeeds
        run: |
          if [ -f data/generated_units/bases-datos/unit-06.json ]; then
            python scripts/validate_generated_units.py >> databases-diagnostic.txt 2>&1
            python scripts/audit_semester_readiness.py --subject bases-datos --strict >> databases-diagnostic.txt 2>&1
          fi

      - name: Commit units or diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add databases-diagnostic.txt
          for unit in data/generated_units/bases-datos/unit-{01..06}.json; do
            if [ -f "$unit" ]; then
              git add "$unit"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Capture Databases materialization [skip databases-final]"
          git push origin HEAD:content/bases-datos-semester-final
