name: Apply Databases Semester Final

on:
  push:
    branches:
      - content/bases-datos-semester-final

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip databases-final]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course branch
        uses: actions/checkout@v4
        with:
          ref: content/bases-datos-semester-final
          token: ${{ secrets.GITHUB_TOKEN }}
          show-progress: false

      - name: Materialize six hash-verified units
        run: python scripts/materialize_bases_datos_semester.py

      - name: Validate units and semester readiness
        run: |
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject bases-datos --strict

      - name: Commit definitive units
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated_units/bases-datos/unit-{01..06}.json
          if git diff --cached --quiet; then
            echo "No academic changes to commit"
            exit 0
          fi
          git commit -m "Add complete Databases semester units [skip databases-final]"
          git push origin HEAD:content/bases-datos-semester-final
