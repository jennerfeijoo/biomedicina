name: Materialize Databases Semester

on:
  push:
    branches:
      - content/bases-datos-semester-course
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course branch
        uses: actions/checkout@v4
        with:
          ref: content/bases-datos-semester-course
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Materialize verified unit package
        run: python scripts/materialize_bases_datos_semester.py

      - name: Validate units and semester architecture
        run: |
          python scripts/validate_generated_units.py
          python scripts/audit_semester_readiness.py --subject bases-datos --strict

      - name: Commit academic units
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated_units/bases-datos/unit-{01..06}.json
          if git diff --cached --quiet; then
            echo "Academic units already materialized"
            exit 0
          fi
          git commit -m "Materialize Databases semester units [skip databases-materializer]"
          git push origin HEAD:content/bases-datos-semester-course
